name: Update sea and weather data

on:
  schedule:
    - cron: '15 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: praias-weather-update
  cancel-in-progress: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch IPMA + weather snapshot + 3-day forecast
        run: python scripts/update_data.py
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json data/ipma/*.json
          git diff --cached --quiet && exit 0
          git commit -m "Atualiza dados de mar, snapshot e previsão 3 dias"
          git push
